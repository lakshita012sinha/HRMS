{% extends 'auth/base.html' %}
{% load static %}

{% block title %}
{{block.super}} HRMS Forgot Password
{% endblock %}

{% block content %}
<div class="wrapper">
    <div class="container auth-box">
        <div class="row border rounded-3 bg-weight shadow box-area">
            <div class="col-12 col-sm-12 col-md-6 col-lg-6 d-flex justify-content-center align-items-center flex-column left-box">
                <div class="featured-outline">
                    <img src="{% static 'images/featured_image/HRM_image.png' %}" class="img-fluid" alt="HRM">
                </div>
                <div class="institution-name mb-3">
                    <h2><strong>SPARROW</strong></h2>
                </div>
                <small class="about-text text-wrap ps-4">SSPL is an ISO 9001:2015(QMS), 27001:2013, 20000-1:2011 certified company.</small>
            </div>
            <div class="col-12 col-sm-12 col-md-6 col-lg-6 right-box">
                <div class="row align-items-center">
                    <div class="header-text mb-4">
                        <div class="featured-image mb-2 text-center">
                            <img src="{% static 'images/logo/sspl_logo.png' %}" class="img-fluid" alt="Official Logo">
                        </div>
                        <h3 class="text-center"><strong>Forgot Your Password?</strong></h3>
                    </div>

                    <!-- Alert Messages -->
                    <div id="alertContainer"></div>

                    <form id="forgotPasswordForm">
                        <label for="user_id" class="mb-1">Enter Your Employee ID</label>
                        <div class="input-group mb-3">
                            <input type="text" class="form-control form-control-lg bg-light fs-6" name="user_id" id="user_id" placeholder="EMP0001" required>
                            <span class="input-group-text">
                                <i class="ri-shield-user-line"></i>
                            </span>
                        </div>
                        <div class="input-group mb-3">
                            <button type="submit" class="btn btn-md primary-button w-100 fs-6" id="verifyBtn">
                                <span id="btnText">Verify</span>
                                <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2" role="status" aria-hidden="true" style="display: none;"></span>
                            </button>
                        </div>
                    </form>

                    <div class="auth-back text-center mb-2">
                        <small><a href="/login/"> <i class="ri-arrow-left-long-line"></i> Back to Login</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // API Configuration
    const API_BASE_URL = 'http://localhost:8000/api/accounts';
    
    // Handle Forgot Password Form Submission
    document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const user_id = document.getElementById('user_id').value.trim();
        
        // Validation
        if (!user_id) {
            showAlert('Please enter your Employee ID', 'warning');
            return;
        }
        
        // Show loading state
        const verifyBtn = document.getElementById('verifyBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        
        verifyBtn.disabled = true;
        btnText.textContent = 'Verifying...';
        btnSpinner.style.display = 'inline-block';
        
        try {
            const response = await fetch(`${API_BASE_URL}/password-reset/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: user_id  // Backend expects email, but we'll use user_id for now
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showAlert('Password reset link has been sent to your registered email. Please check your inbox.', 'success');
                
                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = '/login/';
                }, 3000);
            } else {
                const errorMsg = data.error || data.detail || 'Verification failed. Please try again.';
                showAlert(errorMsg, 'danger');
            }
        } catch (error) {
            console.error('Error:', error);
            showAlert('Network error. Please check your connection and try again.', 'danger');
        } finally {
            // Reset button state
            verifyBtn.disabled = false;
            btnText.textContent = 'Verify';
            btnSpinner.style.display = 'none';
        }
    });
    
    // Show Alert Function
    function showAlert(message, type) {
        const alertContainer = document.getElementById('alertContainer');
        const alertId = 'alert-' + Date.now();
        
        const alertHTML = `
            <div id="${alertId}" class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        `;
        
        alertContainer.innerHTML = alertHTML;
        
        // Auto-dismiss after 5 seconds
        setTimeout(() => {
            const alert = document.getElementById(alertId);
            if (alert) {
                const bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            }
        }, 5000);
    }
</script>

{% endblock %}
