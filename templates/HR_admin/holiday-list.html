{% extends 'HR_admin/base_bar.html' %}
{% load static %}

{% block title %}Holiday List - HRMS{% endblock %}

{% block content %}
<div class="page-header">
    <h4 class="fw-bold mb-3">Holiday List</h4>
    <ul class="breadcrumbs mb-3">
        <li class="nav-home"><a href="/dashboard/"><i class="ri-home-3-line"></i></a></li>
        <li class="separator"><i class="ri-arrow-right-s-line"></i></li>
        <li class="nav-item"><span>Holiday</span></li>
        <li class="separator"><i class="ri-arrow-right-s-line"></i></li>
        <li class="nav-item"><span>Holiday List</span></li>
    </ul>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div id="alertArea"></div>

                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong>Holiday List</strong>
                    <div class="d-flex gap-2">
                        <input type="text" id="searchInput" class="form-control form-control-sm" style="width:200px;" placeholder="Search...">
                        <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addHolidayModal">
                            <i class="ri-add-line"></i> Add Holiday
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover table-bordered table-head-bg-light">
                        <thead>
                            <tr class="text-center">
                                <th>#</th>
                                <th>Date</th>
                                <th>Holiday Name</th>
                                <th>Description</th>
                                <th class="d-print-none">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="holidayBody">
                            <tr><td colspan="5" class="text-center text-muted py-3">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Holiday Modal -->
<div class="modal fade" id="addHolidayModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h6 class="modal-title">Add Holiday</h6>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="addHolidayAlert"></div>
                <div class="mb-2">
                    <label class="form-label">Holiday Name</label>
                    <input type="text" id="hName" class="form-control" placeholder="e.g. Independence Day">
                </div>
                <div class="mb-2">
                    <label class="form-label">Date</label>
                    <input type="date" id="hDate" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">Description <small class="text-muted">(optional)</small></label>
                    <input type="text" id="hDesc" class="form-control" placeholder="Description">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-success btn-sm" id="saveHolidayBtn">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let allHolidays = [];

function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'long', year:'numeric' });
}

function showAlert(container, msg, type='danger') {
    document.getElementById(container).innerHTML =
        `<div class="alert alert-${type} alert-dismissible fade show py-2">
            ${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
         </div>`;
}

async function loadHolidays() {
    try {
        const res = await fetch('/api/attendance/holidays/', { headers: { 'Authorization': 'Token ' + token } });
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        allHolidays = Array.isArray(data) ? data : (data.results || []);
        allHolidays.sort((a, b) => new Date(a.date) - new Date(b.date));
        renderTable(allHolidays);
    } catch(e) {
        showAlert('alertArea', 'Error loading holidays: ' + e.message);
        document.getElementById('holidayBody').innerHTML =
            '<tr><td colspan="5" class="text-center text-muted">Failed to load</td></tr>';
    }
}

function renderTable(holidays) {
    const tbody = document.getElementById('holidayBody');
    if (!holidays.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No holidays found</td></tr>';
        return;
    }
    tbody.innerHTML = holidays.map((h, i) => `
        <tr>
            <td class="text-center">${i + 1}</td>
            <td class="text-center">${fmtDate(h.date)}</td>
            <td class="text-center">${h.holiday_name}</td>
            <td class="text-center">${h.description || '-'}</td>
            <td class="text-center d-print-none">
                <button class="btn btn-danger btn-xs" onclick="deleteHoliday(${h.id}, this)">
                    <i class="ri-delete-bin-line"></i>
                </button>
            </td>
        </tr>`
    ).join('');
}

document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    renderTable(allHolidays.filter(h =>
        h.holiday_name.toLowerCase().includes(q) || h.date.includes(q)
    ));
});

document.addEventListener('DOMContentLoaded', function() {
    loadHolidays();

    document.getElementById('saveHolidayBtn').addEventListener('click', async function() {
        const name = document.getElementById('hName').value.trim();
        const date = document.getElementById('hDate').value;
        const desc = document.getElementById('hDesc').value.trim();

        if (!name || !date) {
            showAlert('addHolidayAlert', 'Holiday name and date are required.');
            return;
        }

        this.disabled = true;
        try {
            const res = await fetch('/api/attendance/holidays/', {
                method: 'POST',
                headers: { 'Authorization': 'Token ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ holiday_name: name, date: date, description: desc })
            });
            const data = await res.json();
            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('addHolidayModal')).hide();
                document.getElementById('hName').value = '';
                document.getElementById('hDate').value = '';
                document.getElementById('hDesc').value = '';
                showAlert('alertArea', 'Holiday added successfully.', 'success');
                loadHolidays();
            } else {
                showAlert('addHolidayAlert', data.date?.[0] || data.holiday_name?.[0] || JSON.stringify(data));
            }
        } catch(e) {
            showAlert('addHolidayAlert', 'Error: ' + e.message);
        } finally { this.disabled = false; }
    });
});

async function deleteHoliday(id, btn) {
    if (!confirm('Delete this holiday?')) return;
    btn.disabled = true;
    try {
        const res = await fetch(`/api/attendance/holidays/${id}/`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Token ' + token }
        });
        if (res.ok || res.status === 204) {
            showAlert('alertArea', 'Holiday deleted.', 'warning');
            loadHolidays();
        } else {
            showAlert('alertArea', 'Failed to delete holiday.');
            btn.disabled = false;
        }
    } catch(e) {
        showAlert('alertArea', 'Error: ' + e.message);
        btn.disabled = false;
    }
}
</script>
{% endblock %}
